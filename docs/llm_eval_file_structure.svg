<svg width="100%" viewBox="0 0 680 740" xmlns="http://www.w3.org/2000/svg">
<defs>
  <style>
    text { font-family: ui-monospace, "Cascadia Code", "Fira Code", monospace; fill: #1a1a1a; }
    .name { font-size: 13px; font-weight: 500; }
    .dim  { font-size: 12px; fill: #888780; }
    .tag  { font-size: 11px; font-weight: 500; }

    .pill-blue   { fill: #E6F1FB; }
    .pill-blue-t { fill: #0C447C; }
    .pill-teal   { fill: #E1F5EE; }
    .pill-teal-t { fill: #085041; }
    .pill-amber  { fill: #FAEEDA; }
    .pill-amber-t{ fill: #633806; }
    .pill-coral  { fill: #FAECE7; }
    .pill-coral-t{ fill: #712B13; }
    .pill-purple { fill: #EEEDFE; }
    .pill-purple-t{ fill: #3C3489; }
    .pill-gray   { fill: #F1EFE8; }
    .pill-gray-t { fill: #444441; }

    .tree-line { stroke: #D3D1C7; stroke-width: 0.5; fill: none; }
  </style>
</defs>

<!-- Header -->
<rect x="40" y="20" width="600" height="36" rx="8" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
